name: Fetch Finance Questions

on:
  schedule:
    # Runs every 3 hours. Adjust cron as needed (this is UTC time).
    - cron: "0 */3 * * *"
  workflow_dispatch: {}  # allows manual "Run workflow" button in GitHub UI

permissions:
  contents: write  # needed so the workflow can commit state.json back

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_CSE_API_KEY: ${{ secrets.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
        run: python main.py

      - name: Commit updated state file
        run: |
          git config --global user.name "finance-question-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "Update sent-questions state [skip ci]"
          git push
