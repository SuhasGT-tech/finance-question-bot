# ---------------------------------------------------------
# Finance Question Bot - Configuration
# ---------------------------------------------------------

# Subreddits to monitor (add/remove freely)
subreddits:
  - personalfinance
  - investing
  - stocks
  - StockMarket
  - FinancialPlanning
  - CryptoCurrency
  - tax
  - povertyfinance
  - dividends
  - options

# How many new posts to pull per subreddit each run
posts_per_subreddit: 25

# NEW: only fetch posts from within this many hours (keeps the feed real-time)
recency_hours: 48

# Minimum score (upvotes) for a post to be considered "worth answering"
# Lowered from 5 -> 1 since brand-new/real-time posts haven't accumulated votes yet
min_score: 1

# Minimum comment count (low comments = still "open" question, good video opportunity)
max_comments_for_opportunity: 15

# Words that indicate a genuine question (used if flair isn't present)
# NOTE: with the stricter checker, only "?" and phrases at the START of a title count
question_keywords:
  - "?"
  - "how do i"
  - "how to"
  - "should i"
  - "what happens"
  - "is it worth"
  - "can someone explain"
  - "help me understand"
  - "eli5"
  - "why does"
  - "what is the difference"

# Finance-relevant keywords to filter noise out of generic subs (not needed for finance-only subs, but useful if you add general subs later)
finance_keywords:
  - invest
  - stock
  - tax
  - loan
  - credit
  - budget
  - saving
  - retirement
  - 401k
  - roth
  - mortgage
  - crypto
  - dividend
  - portfolio
  - debt
  - income

# Optional: Google Custom Search for Quora questions (free tier: 100 queries/day)
quora_search:
  enabled: true       # set true once you add API keys as secrets
  query: "site:quora.com (invest OR stock OR tax OR crypto OR retirement) question"
  max_results: 10



# Optional: StockTwits trending symbols (fully free, no key needed)
# NOTE: disabled by default -- StockTwits blocks requests from cloud/data-center
# IPs (like GitHub Actions), similar to the issue Reddit's own API had. Only
# enable this if you're running the script from your own PC/home network instead.
stocktwits:
  enabled: true
  symbols:
    - SPY
    - AAPL
    - TSLA
    - NVDA
    - BTC.X

stackexchange:
  enabled: true
  site: money
  pagesize: 25
  tags: [budgeting, taxes, investing, retirement, credit, mortgage, debt]   # optional: e.g. [investing, taxes, retirement] to narrow results
